<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>対応記録音声入力</title>
    <style>
        body { font-family: sans-serif; padding: 10px; background: #f0f2f5; margin: 0; }
        #chat-box { height: 55vh; overflow-y: auto; background: white; padding: 15px; border-radius: 8px; margin-bottom: 10px; border: 1px solid #ddd; }
        .msg { margin: 8px 0; padding: 10px 14px; border-radius: 15px; max-width: 85%; line-height: 1.4; word-break: break-all; }
        .user { background: #DCF8C6; margin-left: auto; text-align: left; }
        .ai { background: #EAEAEA; margin-right: auto; white-space: pre-wrap; }
        
        /* ②入力状況フィードバック欄 */
        #preview-box { height: 40px; background: #fff; border: 1px dashed #06C755; padding: 5px 10px; border-radius: 5px; margin-bottom: 10px; font-size: 14px; color: #666; overflow: hidden; display: flex; align-items: center; }
        
        button { width: 100%; padding: 16px; font-size: 16px; border: none; border-radius: 5px; color: white; margin-bottom: 8px; font-weight: bold; cursor: pointer; user-select: none; -webkit-user-select: none; }
        /* ①③対策：長押しボタン */
        #voice-btn { background: #06C755; touch-action: none; }
        #voice-btn.recording { background: #ff4d4d; }
        #copy-btn { background: #333; }
    </style>
</head>
<body>

    <div id="chat-box">
        <div class="msg ai">音声記録を開始します。今日の記録者のお名前と、対象の利用者のお名前を教えてください。</div>
    </div>
    
    <div id="preview-box">🎙️ ボタンを押しながら話してください...</div>

    <button id="voice-btn" onmousedown="startSpeech()" onmouseup="stopSpeech()" ontouchstart="startSpeech(event)" ontouchend="stopSpeech(event)">🎤 押しながら話す</button>
    <button id="copy-btn" onclick="copyResult()">📋 まとめのコピー</button>

    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script>
        // ==========================================
        // 🛠️ あなたの環境に合わせて書き換えてください
        // ==========================================
        const GAS_URL = "https://script.google.com/macros/s/AKfycbwxC16o7VqIFT9Zw17vgWStYSBqqjjg_AlNVBzOMua6TBKZlTmdORBROxuEKFtWKrmo2A/exec"; 
        const LIFF_ID = "2010414852-uQSggBpC";
        // ==========================================

        let recognition;
        let isRecording = false;
        let currentTranscript = ''; // 認識中のテキストを一時保存する変数

        if ('webkitSpeechRecognition' in window) {
            recognition = new webkitSpeechRecognition();
            recognition.continuous = true; 
            recognition.interimResults = true; 
            recognition.lang = 'ja-JP';

            recognition.onresult = (event) => {
                let interimTranscript = '';
                let finalTranscript = '';

                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    if (event.results[i].isFinal) {
                        finalTranscript += event.results[i][0].transcript;
                    } else {
                        interimTranscript += event.results[i][0].transcript;
                    }
                }
                
                // 現在聞き取れている文字を結合して保持
                currentTranscript = finalTranscript || interimTranscript;

                // ②画面へのリアルタイムフィードバック
                const preview = document.getElementById('preview-box');
                preview.innerText = currentTranscript || "聞き取り中...";
                preview.style.color = "#000";
            };

            recognition.onerror = (event) => {
                console.error("音声認識エラー: ", event.error);
            };
        } else {
            alert("お使いの環境は音声認識に対応していません。");
        }

        // 押し始めたとき：マイク起動
        function startSpeech(e) {
            if (e) e.preventDefault(); // スマホの長押しズームや選択メニューを防止
            if (isRecording) return;
            isRecording = true;
            currentTranscript = ''; // 文字をリセット
            
            const btn = document.getElementById('voice-btn');
            btn.innerText = "🛑 離すと送信（録音中...）";
            btn.classList.add('recording');
            
            document.getElementById('preview-box').innerText = "マイク起動中...";
            try {
                recognition.start();
            } catch(err) {
                console.log(err);
            }
        }

        // 離したとき：マイクを止めて確定したテキストを送信
        function stopSpeech(e) {
            if (e) e.preventDefault();
            if (!isRecording) return;
            isRecording = false;

            const btn = document.getElementById('voice-btn');
            btn.innerText = "🎤 押しながら話す";
            btn.classList.remove('recording');

            // 💡 文字の取りこぼしを防ぐため、認識を止めて少し待ってから送信処理へ移る
            recognition.stop();

            setTimeout(() => {
                const text = currentTranscript.trim();
                // 意味のある文字が取得できていれば送信
                if (text && text !== "マイク起動中..." && text !== "聞き取り中...") {
                    addMessage(text, 'user');
                    sendToGemini(text);
                } else {
                    document.getElementById('preview-box').innerText = "⚠️ 上手く聞き取れませんでした。もう一度長押ししてください。";
                    document.getElementById('preview-box').style.color = "#ff4d4d";
                    return;
                }
                
                // 送信完了後に表示を戻す
                setTimeout(() => {
                    if (!isRecording) {
                        document.getElementById('preview-box').innerText = "🎙️ ボタンを押しながら話してください...";
                        document.getElementById('preview-box').style.color = "#666";
                    }
                }, 1500);
            }, 400); // 0.4秒のバッファを設けて音声の確定を待ちます
        }

        function addMessage(text, sender) {
            const box = document.getElementById('chat-box');
            const div = document.createElement('div');
            div.className = `msg ${sender}`;
            div.innerText = text;
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        }

        async function sendToGemini(text) {
            try {
                const response = await fetch(GAS_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text })
                });
                
                if (!response.ok) {
                    throw new Error(`サーバーエラー: ${response.status}`);
                }
                
                const data = await response.json();
                addMessage(data.reply, 'ai');
            } catch (error) {
                console.error(error);
                addMessage("通信エラーが発生しました。GASのURLが正しいか確認してください。", 'ai');
            }
        }

        function copyResult() {
            const messages = document.querySelectorAll('.ai');
            if(messages.length <= 1) return alert("コピーするまとめがありません。");
            const lastMessage = messages[messages.length - 1].innerText;
            navigator.clipboard.writeText(lastMessage).then(() => alert("コピーしました！"));
        }

        liff.init({ liffId: LIFF_ID });
    </script>
</body>
</html>
