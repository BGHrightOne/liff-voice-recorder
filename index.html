<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>対応記録音声入力</title>
    <style>
        body { font-family: sans-serif; padding: 10px; background: #f0f2f5; margin: 0; }
        #chat-box { height: 65vh; overflow-y: auto; background: white; padding: 15px; border-radius: 8px; margin-bottom: 10px; border: 1px solid #ddd; }
        .msg { margin: 8px 0; padding: 10px 14px; border-radius: 15px; max-width: 85%; line-height: 1.4; word-break: break-all; }
        .user { background: #DCF8C6; margin-left: auto; text-align: left; }
        .ai { background: #EAEAEA; margin-right: auto; white-space: pre-wrap; }
        button { width: 100%; padding: 14px; font-size: 16px; border: none; border-radius: 5px; color: white; margin-bottom: 8px; font-weight: bold; cursor: pointer; }
        #voice-btn { background: #06C755; }
        #copy-btn { background: #333; }
    </style>
</head>
<body>

    <div id="chat-box">
        <div class="msg ai">音声記録を開始します。今日の記録者のお名前と、対象の利用者のお名前を教えてください。</div>
    </div>
    <button id="voice-btn" onclick="toggleSpeech()">🎤 音声入力ON (待機中)</button>
    <button id="copy-btn" onclick="copyResult()">📋 まとめのコピー</button>

    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script>
        // ==========================================
        // 🛠️ あなたの環境に合わせてここを書き換えてください
        // ==========================================
        const GAS_URL = "https://script.google.com/macros/s/AKfycbyl77T4urc-r3mL3NaISDC23TiOpygZTCpVaK1yMWMIN2pfYeVu5jD5ECWIl_4WV-DKSA/exec"; 
        const LIFF_ID = "2010414852-AlOIvyW2";
        // ==========================================

        let recognition;
        let isListening = false;

        if ('webkitSpeechRecognition' in window) {
            recognition = new webkitSpeechRecognition();
            recognition.continuous = false;
            recognition.interimResults = false;
            recognition.lang = 'ja-JP';

            recognition.onresult = (event) => {
                const text = event.results[0][0].transcript;
                addMessage(text, 'user');
                sendToGemini(text);
            };

            recognition.onend = () => {
                if (isListening) recognition.start(); 
            };
            
            recognition.onerror = (event) => {
                console.error("音声認識エラー: ", event.error);
            };
        } else {
            alert("お使いのブラウザは音声認識に対応していません。別のブラウザかLINE内でお試しください。");
        }

        function toggleSpeech() {
            const btn = document.getElementById('voice-btn');
            if (!isListening) {
                recognition.start();
                isListening = true;
                btn.innerText = "🛑 音声入力中...（話してください）";
                btn.style.background = "#ff4d4d";
            } else {
                recognition.stop();
                isListening = false;
                btn.innerText = "🎤 音声入力ON (待機中)";
                btn.style.background = "#06C755";
            }
        }

        function addMessage(text, sender) {
            const box = document.getElementById('chat-box');
            const div = document.createElement('div');
            div.className = `msg ${sender}`;
            div.innerText = text;
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        }

        async function sendToGemini(text) {
            try {
                // 明示的にPOSTメソッドを指定し、エラーを防ぎます
                const response = await fetch(GAS_URL, {
                    method: 'POST',
                    method: 'POST',
                    headers: {
                        'Content-Type': 'text/plain' // GASのdoPostでパースしやすい形式
                    },
                    body: JSON.stringify({ message: text })
                });
                const data = await response.json();
                addMessage(data.reply, 'ai');
            } catch (error) {
                console.error(error);
                addMessage("通信エラーが発生しました。もう一度お試しください。", 'ai');
            }
        }

        function copyResult() {
            const messages = document.querySelectorAll('.ai');
            if(messages.length <= 1) {
                alert("コピーするまとめがまだありません。");
                return;
            }
            const lastMessage = messages[messages.length - 1].innerText;
            navigator.clipboard.writeText(lastMessage).then(() => {
                alert("最新のメッセージをコピーしました！");
            }).catch(err => {
                alert("コピーに失敗しました。文字を長押しして選択してください。");
            });
        }

        // LIFFの初期化
        liff.init({ liffId: LIFF_ID })
            .then(() => { console.log("LIFF初期化成功"); })
            .catch((err) => { console.error("LIFF初期化失敗", err); });
    </script>
</body>
</html>
